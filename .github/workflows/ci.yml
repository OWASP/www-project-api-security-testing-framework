name: CI

on:
  push:
    branches: [ main, "feat/**", "fix/**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [ "21" ]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and run tests
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-java-${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 14

  security-scan:
    name: API Security Scan (self-test)
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only run on main push to avoid running against PRs with no live target
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Package fat JAR
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      - name: Run ASTF against public test API
        run: |
          java -jar target/api-security-testing-framework-1.0-SNAPSHOT.jar \
            scan \
            --url https://jsonplaceholder.typicode.com \
            --output-format sarif \
            --output-file results.sarif \
            --timeout 5 \
            --verbose || true   # don't fail the workflow on findings

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        continue-on-error: true   # Code Scanning may not be enabled on all forks
