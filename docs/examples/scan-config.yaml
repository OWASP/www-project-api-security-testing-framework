# OWASP API Security Testing Framework — Example Configuration
# Pass this file to the CLI with: astf scan --config scan-config.yaml
#
# Every field listed here is optional; the CLI can also supply individual
# values via flags which override what is written in this file.

# ── Target ──────────────────────────────────────────────────────────────────
target:
  # Base URL of the API under test (trailing slash is added automatically).
  url: "https://api.example.com"

  # Explicitly list endpoints to test instead of relying on auto-discovery.
  # Each entry requires at minimum a path and HTTP method.
  # endpoints:
  #   - path: "/api/v1/users"
  #     method: "GET"
  #     requiresAuthentication: true
  #     contentType: "application/json"
  #   - path: "/api/v1/users/{id}"
  #     method: "PUT"
  #     requiresAuthentication: true

  # Enable automatic endpoint discovery (OpenAPI spec, common paths, etc.).
  # Set to false if you provide an explicit endpoints list above.
  discoveryEnabled: true

  # URL path patterns to skip during scanning (regex supported).
  excludePatterns:
    - "/health"
    - "/metrics"
    - "/actuator/.*"


# ── Authentication ───────────────────────────────────────────────────────────
auth:
  # Bearer token — automatically added as "Authorization: Bearer <token>"
  # bearerToken: "eyJhbGciOiJIUzI1NiJ9..."

  # API key authentication
  # apiKey: "my-api-key-value"
  # apiKeyHeader: "X-API-Key"   # default header name

  # HTTP Basic authentication
  # basicAuthUsername: "admin"
  # basicAuthPassword: "s3cr3t"


# ── Custom request headers ───────────────────────────────────────────────────
headers:
  Accept: "application/json"
  # X-Custom-Header: "value"


# ── Proxy ────────────────────────────────────────────────────────────────────
# proxy:
#   host: "127.0.0.1"
#   port: 8080
#   username: "proxyuser"      # optional — only if proxy requires auth
#   password: "proxypass"


# ── Test case selection ──────────────────────────────────────────────────────
tests:
  # Run only the listed test case IDs (leave empty to run all enabled tests).
  # enabled:
  #   - "ASTF-API1-2023"
  #   - "ASTF-API2-2023"

  # Exclude specific test case IDs.
  # disabled:
  #   - "ASTF-API10-2023"

  # Suppress findings of these severities from the final report.
  # excludeSeverities:
  #   - "INFO"
  #   - "LOW"

  # Stop after this many total findings (0 = unlimited).
  maxFindings: 0


# ── Execution ────────────────────────────────────────────────────────────────
execution:
  # Number of concurrent virtual threads used for scanning.
  threads: 10

  # Overall scan timeout in minutes.
  timeoutMinutes: 30

  # Milliseconds to sleep between successive requests (0 = no delay).
  # Useful when scanning production systems to avoid triggering rate limits.
  requestDelayMs: 0

  # Hard cap on requests per second (0 = unlimited).
  maxRequestsPerSecond: 0

  # Follow HTTP redirects.
  followRedirects: true

  # Validate TLS/SSL certificates. Set to false only in controlled lab environments.
  validateCertificates: true


# ── Output ───────────────────────────────────────────────────────────────────
output:
  # Report format: JSON | XML | HTML | SARIF
  format: "JSON"

  # Write the report to a file (omit to print to stdout).
  # file: "astf-report.json"

  # Print verbose progress and debug information.
  verbose: false
